name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-flink-jobs:
    name: Build Flink Jobs (Java 11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
      - name: Build (skip tests, fast)
        run: mvn -B -pl flink-jobs -am package -DskipTests
      - name: Upload Flink jar
        uses: actions/upload-artifact@v4
        with:
          name: flink-jar
          path: flink-jobs/target/gis-sync-app-*.jar
          retention-days: 7

  build-backend:
    name: Build Backend (Java 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build
        run: mvn -B -pl backend -am package -DskipTests
      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/gis-sync-backend-*.jar
          retention-days: 7

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  integration-tests:
    name: Integration Tests (Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-flink-jobs
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
      # ubuntu-latest 自带 docker，testcontainers 直接可用
      - name: Run mvn verify (含 *IT.java)
        run: mvn -B -pl flink-jobs -am verify
        env:
          # testcontainers 默认就能跑，但加这个让镜像拉取更快
          TESTCONTAINERS_RYUK_DISABLED: "false"
      - name: Upload surefire/failsafe reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            flink-jobs/target/surefire-reports
            flink-jobs/target/failsafe-reports
          retention-days: 7
