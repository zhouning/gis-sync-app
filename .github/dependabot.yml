version: 2
updates:
  # Maven 多模块（root pom.xml 是 aggregator，dependabot 会发现 flink-jobs 和 backend 各自的 pom）
  - package-ecosystem: maven
    directory: "/flink-jobs"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      flink-and-connectors:
        patterns:
          - "org.apache.flink:*"
      sedona:
        patterns:
          - "org.apache.sedona:*"
      geotools:
        patterns:
          - "org.geotools:*"
      test:
        dependency-type: development

  - package-ecosystem: maven
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
          - "org.springframework:*"
          - "org.springframework.kafka:*"
      confluent:
        patterns:
          - "io.confluent:*"
      test:
        dependency-type: development

  # 前端
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      antd:
        patterns:
          - "antd"
      build-tools:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"

  # GitHub Actions 本身
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
