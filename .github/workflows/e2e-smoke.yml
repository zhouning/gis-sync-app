name: E2E Smoke

# 完整 docker compose smoke：跑全部容器（PG、Kafka、SR、Flink、backend、Prometheus 等），
# 提交 Flink 作业，注入数据，验证端到端。比 CI 慢，只在 main push / 手动触发跑。
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: docker compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (build backend)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build all jars
        run: mvn -B clean package -DskipTests

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Fetch Flink connector libs
        working-directory: docker
        run: bash fetch-libs.sh

      - name: Run smoke
        run: bash scripts/smoke.sh

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs --tail=200
